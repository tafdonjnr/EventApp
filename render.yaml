services:
  - type: web
    name: eventapp-server
    env: node
    plan: starter
    rootDir: server
    buildCommand: npm install && npm audit fix --force
    startCommand: node index.js
    envVars:
      - key: NODE_ENV
        value: production
      # Code reads process.env.PAYSTACK_SECRET_KEY (see server/routes/payments.js)
      - key: PAYSTACK_SECRET_KEY
        sync: false

  - type: web
    name: eventapp-client
    env: static
    plan: starter
    rootDir: client
    buildCommand: npm install && npm audit fix --force && npm run build
    staticPublishPath: build
